<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — XAI Healthcare DSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar starting with 'collapsed' for priority on chat -->
        <div class="sidebar collapsed" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">XAI Healthcare DSS</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><span>Chat & Triage</span></a>
                <a href="performance.html" class="nav-item"><span>Performance</span></a>
                <a href="comparison.html" class="nav-item"><span>Comparison</span></a>
            </nav>
            <div class="sidebar-footer">v1.1.0 — Responsive Prototype</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="sidebar-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </div>
                <div class="font-semibold" style="font-size: 15px;">Diagnostic Consultation</div>
                <div style="flex: 1"></div>
                <button class="btn btn-outline small" id="new-consultation-btn">New Session</button>
            </header>

            <div class="content-body fade-in">
                <div class="chat-container">
                    <!-- Chat Area -->
                    <div class="chat-box">
                        <div class="chat-messages" id="chat-window"></div>
                        <div id="interaction-area" style="padding: 16px; border-top: 1px solid var(--border);"></div>
                    </div>

                    <!-- Side Panel -->
                    <div id="side-panel">
                        <div id="symptom-selection" class="card" style="height: 100%; display: none;">
                            <h3 class="card-title">Symptom Inventory</h3>
                            <p class="text-muted small mb-6">Select all signs to generate a triage report.</p>
                            <div class="chip-grid" id="symptom-grid"></div>
                            <div class="mt-6">
                                <button class="btn btn-primary" id="analyse-btn" style="width: 100%;" disabled>Identify Prognosis</button>
                            </div>
                        </div>
                        <div id="result-container">
                            <div class="card" style="height: 100%; display: flex; align-items: center; justify-content: center; border-style: dashed; color: var(--text-muted);">
                                Analysis will appear here
                            </div>
                        </div>
                    </div>
                </div>
                <footer style="margin-top: 32px; text-align: center; font-size: 11px; color: var(--text-muted);">
                    Educational prototype only — not a substitute for professional medical advice.
                </footer>
            </div>
        </div>
    </div>

    <script>
        const SEVERITY = {'high fever':4,'cough':2,'shortness of breath':5,'chest pain':6,'headache':3,'fatigue':2,'nausea':2,'vomiting':3,'diarrhoea':2,'abdominal pain':4,'joint pain':3,'skin rash':2,'sore throat':1,'runny nose':1,'low oxygen':7,'dizziness':3,'sweating':2,'body ache':3,'sneezing':1,'itchy eyes':1,'rapid breathing':5};
        const SYMPTOMS = Object.keys(SEVERITY);
        const DISEASE_LOOKUP = [
            { name: "Flu", pattern: ["high fever", "cough", "body ache", "fatigue"] },
            { name: "Common Cold", pattern: ["sneezing", "runny nose", "sore throat", "cough"] },
            { name: "Pneumonia", pattern: ["shortness of breath", "high fever", "chest pain", "rapid breathing"] },
            { name: "Gastroenteritis", pattern: ["nausea", "vomiting", "diarrhoea", "abdominal pain"] },
            { name: "Dengue fever", pattern: ["high fever", "joint pain", "skin rash", "headache"] },
            { name: "Allergy", pattern: ["sneezing", "itchy eyes", "runny nose"] },
            { name: "Migraine", pattern: ["headache", "nausea", "dizziness"] },
            { name: "Typhoid", pattern: ["abdominal pain", "high fever", "nausea", "vomiting"] }
        ];

        let state = { ageGroup: null, duration: null, selectedSymptoms: new Set() };
        const chatWindow = document.getElementById('chat-window');
        const interactionArea = document.getElementById('interaction-area');
        const symptomSelection = document.getElementById('symptom-selection');
        const symptomGrid = document.getElementById('symptom-grid');
        const analyseBtn = document.getElementById('analyse-btn');
        const resultContainer = document.getElementById('result-container');

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg fade-in`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function startChat() {
            chatWindow.innerHTML = ''; resultContainer.innerHTML = ''; symptomSelection.style.display = 'none';
            resultContainer.innerHTML = '<div class="card" style="height: 100%; display: flex; align-items: center; justify-content: center; border-style: dashed; color: var(--text-muted);">Awaiting symptom input...</div>';
            state = { ageGroup: null, duration: null, selectedSymptoms: new Set() };
            addMessage("Welcome. To begin triage, please select your age group.", "bot");
            renderButtons(['Child', 'Adult', 'Senior'], (choice) => {
                state.ageGroup = choice; addMessage(choice, 'user'); step2();
            });
        }

        function step2() {
            interactionArea.innerHTML = '';
            setTimeout(() => {
                addMessage("How long have symptoms been active?", "bot");
                renderButtons(['< 24h', '1-3 days', '> 3 days'], (choice) => {
                    state.duration = choice; addMessage(choice, 'user'); step3();
                });
            }, 500);
        }

        function step3() {
            interactionArea.innerHTML = '';
            setTimeout(() => {
                addMessage("Please select all applicable symptoms in the inventory panel.", "bot");
                renderSymptomChips();
                symptomSelection.style.display = 'block';
                resultContainer.innerHTML = ''; resultContainer.appendChild(symptomSelection);
            }, 500);
        }

        function renderButtons(list, callback) {
            const container = document.createElement('div'); container.style.display = 'flex'; container.style.gap = '8px';
            list.forEach(item => {
                const btn = document.createElement('button'); btn.className = 'btn btn-outline small'; btn.textContent = item;
                btn.onclick = () => callback(item); container.appendChild(btn);
            });
            interactionArea.appendChild(container);
        }

        function renderSymptomChips() {
            symptomGrid.innerHTML = '';
            SYMPTOMS.forEach(s => {
                const chip = document.createElement('div'); chip.className = 'chip'; chip.textContent = s;
                chip.onclick = () => {
                    chip.classList.toggle('active');
                    if (chip.classList.contains('active')) state.selectedSymptoms.add(s);
                    else state.selectedSymptoms.delete(s);
                    analyseBtn.disabled = state.selectedSymptoms.size === 0;
                };
                symptomGrid.appendChild(chip);
            });
        }

        analyseBtn.onclick = () => {
            let score = 0; state.selectedSymptoms.forEach(s => score += SEVERITY[s]);
            let zone = score > 20 ? 'RED' : (score >= 10 ? 'YELLOW' : 'GREEN');
            let color = zone === 'RED' ? '#991b1b' : (zone === 'YELLOW' ? '#92400e' : '#166534');
            
            resultContainer.innerHTML = `
                <div class="card fade-in" style="border: 2px solid ${color}; height: 100%;">
                    <h2 style="color: ${color}; margin-bottom: 20px;">${zone} - ${zone === 'RED' ? 'Emergency' : (zone === 'YELLOW' ? 'Urgent' : 'Home Care')}</h2>
                    <div class="grid-cols-2 mb-6">
                        <div><p class="text-muted small">SEVERITY</p><p class="font-semibold">${score} pts</p></div>
                        <div><p class="text-muted small">PATIENT</p><p class="font-semibold">${state.ageGroup}</p></div>
                    </div>
                    <div class="mb-6">
                        <p class="text-muted small mb-6">CONTRIBUTING FACTORS (SHAP)</p>
                        ${Array.from(state.selectedSymptoms).sort((a,b)=>SEVERITY[b]-SEVERITY[a]).slice(0,3).map(s=>`
                            <div class="mb-6">
                                <div class="flex justify-between small mb-6"><span>${s}</span><span>${SEVERITY[s]}</span></div>
                                <div style="height:4px; background:var(--bg-tertiary); overflow:hidden; border-radius:2px;"><div style="width:${(SEVERITY[s]/7)*100}%; height:100%; background:${color}"></div></div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-primary mt-6" style="width:100%" onclick="startChat()">New Consultation</button>
                </div>
            `;
            addMessage("Triage complete. Analysis shown on right.", "bot");
        };

        // Sidebar logic
        const sidebar = document.getElementById('sidebar');
        const toggle = document.getElementById('sidebar-toggle');
        toggle.onclick = () => {
            if (window.innerWidth <= 1100) sidebar.classList.toggle('active');
            else sidebar.classList.toggle('collapsed');
        };
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 1100 && !sidebar.contains(e.target) && !toggle.contains(e.target) && sidebar.classList.contains('active'))
                sidebar.classList.remove('active');
        });

        document.getElementById('new-consultation-btn').onclick = startChat;
        startChat();
    </script>
</body>
</html>
